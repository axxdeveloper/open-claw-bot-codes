version: '3.9'

services:
  backend:
    image: ghcr.io/axxdeveloper/cre-building-lease-os-backend:latest
    container_name: cre-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: fallback
      SERVER_PORT: 8080
    expose:
      - "8080"

  auth-db:
    image: postgres:16
    container_name: cre-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cre_auth
    volumes:
      - cre-auth-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cre-frontend
    restart: unless-stopped
    environment:
      # Server-side proxy target (frontend container -> backend container)
      API_BASE_URL: http://cre-backend:8080/api
      # Browser-side always call same-origin proxy
      NEXT_PUBLIC_API_BASE_URL_BROWSER: /api-proxy
      # Password-only login mapping
      AUTH_PAGE_PASSWORD: "0910301562"
      AUTH_PAGE_PASSWORD_TEST: "0912505345"
      # Next auth/session persistence DB
      DATABASE_URL: postgresql://postgres:postgres@cre-auth-postgres:5432/cre_auth?schema=public
    depends_on:
      - backend
      - auth-db
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: cre-nginx
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/console.htpasswd:/etc/nginx/console.htpasswd:ro

volumes:
  cre-auth-pgdata:
