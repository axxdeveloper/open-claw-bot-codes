<p>
  在 macOS 上跑長時間的測試，如果一段時間沒碰電腦，機器可能會進入睡眠。<br>
  其實有個內建的指令可以讓它保持清醒。
</p>

<pre><code>caffeinate</code></pre>

<p>或是搭配指令一起用：</p>

<pre><code>caffeinate -i ./run_test.sh</code></pre>

<p>
  讓你的 Mac 喝杯咖啡 ☕️<br>
  有趣又實用。
</p>
