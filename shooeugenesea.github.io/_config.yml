title: Isaac Note
description: Software engineering, macroeconomics, and ETF investing — Java, Spring Boot, system design, Fed policy, and market analysis
url: "https://www.isaacnote.com"
og_image: "/assets/images/social/og-default.jpg"
baseurl: ""

remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"

timezone: Asia/Taipei
encoding: utf-8
future: true

permalink: /:year/:month/:day/:title/

paginate: 20
paginate_path: "/page/:num/"

search: true

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-0J8SWP88Y4"

author:
  name: "Isaac"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

include:
  - _pages

breadcrumbs: false

defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "single"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "single"
      share: true
      related: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

after_footer_scripts:
  - /assets/js/code-line-numbers.js

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
